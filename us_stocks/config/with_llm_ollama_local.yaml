data:
  tickers:
    - AAPL
    - AMZN
    - AVGO
    - COST
    - GOOGL
    - JPM
    - META
    - MSFT
    - NVDA
    - XOM
  benchmark: SPY
  start: "2018-01-01"
  end:

strategy:
  rebalance: monthly
  top_n: 4
  min_history_days: 200
  trend_filter_mode: soft
  trend_penalty: 0.35
  momentum_20_weight: 0.45
  momentum_60_weight: 0.35
  volatility_weight: -0.20
  llm_weight: 0.35

backtest:
  transaction_cost_bps: 10.0

llm:
  enabled: true
  signal_path: signals/llm_scores.ollama_local.generated.csv
  horizon_bucket: swing

scoring:
  provider: openai-compatible
  base_url: http://127.0.0.1:11434/v1
  model: qwen2.5:3b-instruct-q5_0
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 180
  temperature: 0.0
  env_file: .env.us.ollama_local

risk:
  capital_base: 100000.0
  cash_buffer: 0.05
  max_position_weight: 0.25
  min_trade_notional: 250.0
  allow_fractional_shares: true

workflow:
  forms:
    - 10-K
    - 10-Q
    - 8-K
  start_date_lookback_days: 180
  limit_per_ticker: 2
  pause_seconds: 0.25
  max_chars: 200000
  min_section_chars: 250
  positions_path: paper/ollama_local/current_positions.csv
  output_root: runs/ollama_local
  apply_paper_orders: false

output:
  data_dir: data
  artifacts_dir: artifacts/with_llm_ollama_local
