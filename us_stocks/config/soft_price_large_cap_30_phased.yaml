data:
  universe_snapshots_file: universes/liquid_large_cap_30_phased_snapshots.csv
  metadata_file: universes/liquid_large_cap_30_metadata.csv
  benchmark: SPY
  start: "2018-01-01"
  end:

strategy:
  rebalance: monthly
  top_n: 8
  min_history_days: 200
  trend_filter_mode: soft
  trend_penalty: 0.35
  momentum_20_weight: 0.45
  momentum_60_weight: 0.35
  volatility_weight: -0.20
  llm_weight: 0.00

backtest:
  transaction_cost_bps: 10.0

llm:
  enabled: false
  signal_path: signals/llm_scores.generated.csv
  horizon_bucket: swing

scoring:
  provider: heuristic
  base_url: https://api.deepseek.com
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  timeout_seconds: 60
  temperature: 0.0

risk:
  capital_base: 100000.0
  cash_buffer: 0.04
  max_position_weight: 0.12
  min_trade_notional: 250.0
  allow_fractional_shares: true

workflow:
  forms:
    - 10-K
    - 10-Q
    - 8-K
  start_date_lookback_days: 180
  limit_per_ticker: 1
  pause_seconds: 0.25
  max_chars: 200000
  min_section_chars: 250
  positions_path: paper/current_positions.csv
  output_root: runs
  apply_paper_orders: false

output:
  data_dir: data_large_cap_30_phased
  artifacts_dir: artifacts/soft_price_large_cap_30_phased
